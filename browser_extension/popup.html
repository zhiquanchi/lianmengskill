<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok AI Assistant</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Grok AI Assistant</h1>
            <div class="status">
                <span class="status-label">Status:</span>
                <span id="status" class="status-indicator disconnected">Disconnected</span>
            </div>
        </header>

        <main>
            <section class="connection-section">
                <h2>Backend Connection</h2>
                <div class="form-group">
                    <label for="wsUrl">WebSocket URL:</label>
                    <input 
                        type="text" 
                        id="wsUrl" 
                        value="ws://127.0.0.1:8765/ws"
                        placeholder="ws://127.0.0.1:8765/ws">
                </div>
                <div class="button-group">
                    <button id="connectBtn" class="btn btn-primary">Connect</button>
                    <button id="disconnectBtn" class="btn btn-secondary" disabled>Disconnect</button>
                </div>
                <div id="connectionStatus" class="connection-status"></div>
            </section>

            <section class="grok-section">
                <h2>Grok Settings</h2>
                <div class="form-group">
                    <label for="grokUrl">Grok URL:</label>
                    <input 
                        type="text" 
                        id="grokUrl" 
                        value="https://grok.com"
                        placeholder="https://grok.com">
                </div>
                <div class="form-group">
                    <label>
                        <input type="checkbox" id="autoOpen" checked>
                        Auto-open Grok tab on connect
                    </label>
                </div>
                <button id="openGrokBtn" class="btn btn-secondary">Open Grok Tab</button>
            </section>

            <section class="status-section">
                <h2>Current Status</h2>
                <div class="status-info">
                    <div class="status-item">
                        <span class="label">WebSocket:</span>
                        <span id="wsStatus" class="value">Not connected</span>
                    </div>
                    <div class="status-item">
                        <span class="label">Grok Tab:</span>
                        <span id="grokTabStatus" class="value">Not open</span>
                    </div>
                    <div class="status-item">
                        <span class="label">Matched URL:</span>
                        <span id="grokUrlStatus" class="value">No Grok tab detected</span>
                    </div>
                    <div class="status-item">
                        <span class="label">Page State:</span>
                        <span id="pageStatus" class="value">Content script not ready</span>
                    </div>
                    <div class="status-item">
                        <span class="label">Last Activity:</span>
                        <span id="lastActivity" class="value">Never</span>
                    </div>
                    <div class="status-item">
                        <span class="label">Messages Sent:</span>
                        <span id="messagesSent" class="value">0</span>
                    </div>
                    <div class="status-item">
                        <span class="label">Last Error:</span>
                        <span id="lastError" class="value">None</span>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <div class="version">v0.1.0</div>
            <div class="controls">
                <button id="refreshBtn" class="btn btn-small">Refresh</button>
                <button id="clearStatsBtn" class="btn btn-small">Clear Stats</button>
            </div>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
